<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>管制员培训报表审核系统</title>
<script src="./jszip.min.js"></script>
<script src="./xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;font-size:15px;line-height:1.6;color:#333;background:#EDEDED;min-height:100vh;overflow-x:hidden}
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:48px;background:linear-gradient(135deg,#07C160,#06AD56);display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.navbar-title{color:#fff;font-size:17px;font-weight:600;letter-spacing:.5px}
.container{padding:60px 16px 30px;max-width:600px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:16px;font-weight:600;color:#333;margin-bottom:12px}
.upload-zone{border:2px dashed #C8D0D8;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#F8FAFB}
.upload-zone:hover,.upload-zone.dragover{border-color:#07C160;background:#F0FBF4}
.upload-icon{font-size:48px;margin-bottom:12px;color:#07C160}
.upload-text{font-size:15px;color:#666;margin-bottom:8px}
.upload-hint{font-size:13px;color:#999}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;transition:all .2s;text-align:center}
.btn-primary{background:#07C160;color:#fff}
.btn-primary:hover{background:#06AD56}
.btn-primary:disabled{background:#A8E6C1;cursor:not-allowed}
.btn-outline{background:#fff;color:#07C160;border:1px solid #07C160}
.btn-outline:hover{background:#F0FBF4}
.progress-card{display:none}
.progress-steps{list-style:none}
.progress-step{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #F0F0F0;font-size:14px;color:#999}
.progress-step:last-child{border-bottom:none}
.progress-step.active{color:#07C160;font-weight:500}
.progress-step.done{color:#333}
.step-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:12px;flex-shrink:0;background:#E8E8E8;color:#999}
.progress-step.active .step-icon{background:#07C160;color:#fff}
.progress-step.done .step-icon{background:#07C160;color:#fff}
.progress-bar{height:4px;background:#E8E8E8;border-radius:2px;margin-top:12px;overflow:hidden}
.progress-fill{height:100%;background:#07C160;border-radius:2px;transition:width .3s;width:0}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-item{background:#F8FAFB;border-radius:8px;padding:16px;text-align:center}
.stat-value{font-size:28px;font-weight:700;color:#07C160}
.stat-label{font-size:13px;color:#999;margin-top:4px}
.student-item{border:1px solid #E8E8E8;border-radius:8px;margin-bottom:8px;overflow:hidden}
.student-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;background:#FAFAFA;transition:background .2s}
.student-header:hover{background:#F0F0F0}
.student-name{font-weight:500;font-size:14px}
.student-count{font-size:12px;color:#999;background:#F0F0F0;padding:2px 8px;border-radius:10px}
.student-detail{display:none;padding:12px 16px;border-top:1px solid #E8E8E8}
.student-detail.open{display:block}
.issue-item{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #F5F5F5}
.issue-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.issue-problem{font-size:13px;color:#E64340;margin-bottom:4px;line-height:1.5}
.issue-fix{font-size:13px;color:#07C160;line-height:1.5}
.issue-label{font-weight:500;margin-right:4px}
.results-card{display:none}
.download-section{margin-top:16px}
.error-msg{background:#FFF2F2;color:#E64340;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none}
.file-list{margin-top:12px;max-height:200px;overflow-y:auto}
.file-item{display:flex;align-items:center;padding:6px 0;font-size:13px;color:#666;border-bottom:1px solid #F5F5F5}
.file-item:last-child{border-bottom:none}
.file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-status{margin-left:8px;font-size:12px}
.file-status.ok{color:#07C160}
.file-status.fail{color:#E64340}
.section{display:none}
.section.visible{display:block}
.empty-state{text-align:center;padding:40px 20px;color:#999}
.empty-icon{font-size:64px;margin-bottom:16px;opacity:.5}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:500}
.badge-warning{background:#FFF3E0;color:#E65100}
.badge-danger{background:#FFEBEE;color:#C62828}
.badge-success{background:#E8F5E9;color:#2E7D32}
.toggle-arrow{transition:transform .2s;color:#999;font-size:12px}
.toggle-arrow.open{transform:rotate(90deg)}
</style>
</head>
<body>
<div class="navbar"><span class="navbar-title">管制员培训报表审核系统</span></div>
<div class="container">
  <!-- Upload Section -->
  <div id="sectionUpload" class="section visible">
    <div class="card">
      <div class="card-title">上传报表文件</div>
      <div class="upload-zone" id="dropZone">
        <div class="upload-icon">&#128196;</div>
        <div class="upload-text">点击选择文件或拖拽到此处</div>
        <div class="upload-hint">月报表(docx)或季度报表(xlsx)的压缩包，支持RAR/ZIP</div>
        <input type="file" id="fileInput" accept=".rar,.zip" style="display:none">
        <input type="file" id="folderInput" webkitdirectory style="display:none">
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-outline" style="flex:1" onclick="document.getElementById('fileInput').click()">选择压缩包</button>
        <button class="btn btn-outline" style="flex:1" onclick="document.getElementById('folderInput').click()">选择文件夹</button>
      </div>
      <div class="file-list" id="fileList" style="display:none"></div>
    </div>
    <div id="errorMsg" class="error-msg"></div>
    <button class="btn btn-primary" id="btnStart" disabled onclick="startAudit()">开始审核</button>
  </div>

  <!-- Progress Section -->
  <div id="sectionProgress" class="section">
    <div class="card progress-card" style="display:block">
      <div class="card-title">审核进度</div>
      <ul class="progress-steps">
        <li class="progress-step" id="step1"><span class="step-icon">1</span>解压文件</li>
        <li class="progress-step" id="step2"><span class="step-icon">2</span>解析文档</li>
        <li class="progress-step" id="step3"><span class="step-icon">3</span>执行检查</li>
        <li class="progress-step" id="step4"><span class="step-icon">4</span>生成报告</li>
      </ul>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <!-- Results Section -->
  <div id="sectionResults" class="section">
    <div class="card">
      <div class="card-title">审核概览</div>
      <div class="stats-grid">
        <div class="stat-item"><div class="stat-value" id="statDocs">0</div><div class="stat-label">解析文档</div></div>
        <div class="stat-item"><div class="stat-value" id="statStudents">0</div><div class="stat-label">学员总数</div></div>
        <div class="stat-item"><div class="stat-value" id="statIssues">0</div><div class="stat-label">发现问题</div></div>
        <div class="stat-item"><div class="stat-value" id="statAffected">0</div><div class="stat-label">涉及学员</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">问题详情</div>
      <div id="resultsList"></div>
    </div>
    <div class="card download-section">
      <button class="btn btn-primary" onclick="downloadExcel()">下载检查结果 Excel</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="resetApp()">重新审核</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 全局状态
// ============================================================
let uploadedFiles = []; // [{name, data: ArrayBuffer}]
let auditResults = null;
let auditMode = null; // 'monthly' or 'quarterly'
let prevQuarterFiles = []; // [{name, data: ArrayBuffer}] for previous quarter xlsx

// ============================================================
// 审核配置
// ============================================================
const CORRECT_TRAINER = '刘兵';
const CORRECT_DIRECTOR = '张文轩';
const SIMILARITY_THRESHOLD = 0.75;
const HORIZONTAL_THRESHOLD = 0.85;

// ============================================================
// Word XML 命名空间
// ============================================================
const W_NS = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main';

// ============================================================
// DOCX 解析器
// ============================================================
async function parseDocx(arrayBuffer) {
  const zip = await JSZip.loadAsync(arrayBuffer);
  const docXml = await zip.file('word/document.xml').async('text');
  const parser = new DOMParser();
  const xmlDoc = parser.parseFromString(docXml, 'application/xml');
  const tables = xmlDoc.getElementsByTagNameNS(W_NS, 'tbl');
  if (tables.length === 0) throw new Error('文档中没有找到表格');
  return parseTable(tables[0]);
}

function parseTable(tbl) {
  const rows = [];
  const trs = tbl.getElementsByTagNameNS(W_NS, 'tr');
  for (let i = 0; i < trs.length; i++) {
    const tr = trs[i];
    const tcs = tr.getElementsByTagNameNS(W_NS, 'tc');
    const row = [];
    for (let j = 0; j < tcs.length; j++) {
      const tc = tcs[j];
      const tcPr = tc.getElementsByTagNameNS(W_NS, 'tcPr')[0];
      let vMergeVal = null;
      if (tcPr) {
        const vmEls = tcPr.getElementsByTagNameNS(W_NS, 'vMerge');
        if (vmEls.length > 0) {
          vMergeVal = vmEls[0].getAttributeNS(W_NS, 'val') || vmEls[0].getAttribute('w:val') || 'continue';
        }
      }
      if (vMergeVal === 'continue') {
        row.push('');
      } else {
        row.push(getCellText(tc));
      }
    }
    rows.push(row);
  }
  return rows;
}

function getCellText(tc) {
  const texts = [];
  const ps = tc.getElementsByTagNameNS(W_NS, 'p');
  for (let p = 0; p < ps.length; p++) {
    const runs = ps[p].getElementsByTagNameNS(W_NS, 'r');
    let pText = '';
    for (let r = 0; r < runs.length; r++) {
      const ts = runs[r].getElementsByTagNameNS(W_NS, 't');
      for (let t = 0; t < ts.length; t++) {
        pText += ts[t].textContent || '';
      }
    }
    texts.push(pText);
  }
  return texts.join('\n').trim();
}

// ============================================================
// 工具函数
// ============================================================
function findRowByContent(rows, pattern, start) {
  start = start || 0;
  const re = new RegExp(pattern);
  for (let i = start; i < rows.length; i++) {
    for (let j = 0; j < rows[i].length; j++) {
      if (re.test(rows[i][j])) return i;
    }
  }
  return -1;
}

function parseHours(text) {
  const m = text.match(/(\d+\.?\d*)\s*小时/);
  return m ? parseFloat(m[1]) : null;
}

function parseDateFromText(text) {
  const m = text.match(/(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/);
  if (m) return m[1] + '.' + m[2].padStart(2,'0') + '.' + m[3].padStart(2,'0');
  return null;
}

function extractMonthFromDate(dateStr) {
  if (!dateStr) return null;
  const m = dateStr.match(/\.(\d{1,2})/);
  return m ? parseInt(m[1]) : null;
}

function parseNameFromFilename(filename) {
  const matches = filename.match(/[（(]([^）)]+)[）)]/g);
  if (!matches) return null;
  const last = matches[matches.length - 1];
  return last.replace(/[（()）]/g, '').trim();
}

function parseMonthFromFilename(filename) {
  const m = filename.match(/(\d{4})\s*年\s*(\d{1,2})\s*月/);
  return m ? parseInt(m[2]) : null;
}

function calcSimilarity(s1, s2) {
  if (!s1 || !s2) return 0;
  if (s1 === s2) return 1;
  // Use longest common subsequence ratio
  const a = s1, b = s2;
  const m = a.length, n = b.length;
  if (m === 0 || n === 0) return 0;
  // Optimization: use character-level comparison with windowing for long texts
  if (m > 5000 || n > 5000) {
    // For very long texts, use paragraph-level comparison
    const paras1 = a.split(/\n/).filter(p => p.trim());
    const paras2 = b.split(/\n/).filter(p => p.trim());
    let matchLen = 0;
    for (const p1 of paras1) {
      for (const p2 of paras2) {
        if (p1 === p2) { matchLen += p1.length; break; }
      }
    }
    return (2 * matchLen) / (m + n);
  }
  // Standard LCS-based similarity
  const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (a[i-1] === b[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
      else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  const lcsLen = dp[m][n];
  return (2 * lcsLen) / (m + n);
}

// ============================================================
// 解析单个文档
// ============================================================
function parseDocInfo(rows, filename) {
  const nrows = rows.length;
  const info = {
    filename: filename,
    student_name: parseNameFromFilename(filename),
    file_month: parseMonthFromFilename(filename),
  };

  const rowEntry = findRowByContent(rows, '入职时间');
  const rowStage = findRowByContent(rows, '本报告培训阶段');
  const rowHoursCmd = findRowByContent(rows, '管制指挥岗');
  const rowHoursAst = findRowByContent(rows, '助理管制岗');
  const rowSummary = findRowByContent(rows, '见习管制员本月培训总结');
  const rowCommentLabel = findRowByContent(rows, '^责任教员评语$');
  const rowTrainerSig = findRowByContent(rows, '科室培训主管签名');
  const rowDirectorSig = findRowByContent(rows, '科室主任签名');

  // 入职时间 + 岗位见习开始时间（扫描整行去重）
  if (rowEntry >= 0) {
    const allDates = [];
    const seen = new Set();
    for (const cellText of rows[rowEntry]) {
      const dates = cellText.match(/\d{4}\.\d{1,2}(?:\.\d{1,2})?/g) || [];
      for (const d of dates) {
        if (!seen.has(d)) { seen.add(d); allDates.push(d); }
      }
    }
    info.entry_date = allDates.length > 0 ? allDates[0] : null;
    info.internship_start = allDates.length > 1 ? allDates[allDates.length - 1] : null;
  } else {
    info.entry_date = null;
    info.internship_start = null;
  }

  // 培训阶段
  if (rowStage >= 0) {
    let stageText = '';
    for (const ct of rows[rowStage]) {
      if (/\d{4}\s*年\s*\d{1,2}\s*月/.test(ct)) { stageText = ct; break; }
    }
    info.stage_text = stageText;
    const m = stageText.match(/(\d{4})\s*年\s*(\d{1,2})\s*月/);
    info.stage_month = m ? parseInt(m[2]) : null;
  } else {
    info.stage_text = '';
    info.stage_month = null;
  }

  // 岗位实作时长
  info.hours_command = null;
  if (rowHoursCmd >= 0) {
    for (const ct of rows[rowHoursCmd]) {
      const h = parseHours(ct);
      if (h !== null) { info.hours_command = h; break; }
    }
  }
  info.hours_assistant = null;
  if (rowHoursAst >= 0) {
    for (const ct of rows[rowHoursAst]) {
      const h = parseHours(ct);
      if (h !== null) { info.hours_assistant = h; break; }
    }
  }

  // 学员总结
  if (rowSummary >= 0) {
    const summaryText = rows[rowSummary][0] || '';
    info.summary_full = summaryText;
    info.summary_has_overview = /总体情况/.test(summaryText);
    info.summary_has_detail = /具体情况/.test(summaryText);
    info.summary_has_next = /下月重点/.test(summaryText);
    let body = summaryText.replace(/见习管制员本月培训总结/, '').trim();
    body = body.replace(/(总体情况|具体情况|下月重点)/g, '').trim();
    info.summary_body = body;
  } else {
    info.summary_full = '';
    info.summary_has_overview = false;
    info.summary_has_detail = false;
    info.summary_has_next = false;
    info.summary_body = '';
  }

  // 教员评语
  const commentRow = rowCommentLabel >= 0 ? rowCommentLabel + 1 : -1;
  if (commentRow > 0 && commentRow < nrows) {
    const commentText = rows[commentRow][0] || '';
    info.comment_full = commentText;
    info.comment_has_audit = /审核|真实|准确|完整/.test(commentText);
    info.comment_has_improvement = /纠正|改进|完成|情况|评估/.test(commentText);
    info.comment_has_direction = /关注|重点|方向|完善|后续/.test(commentText);
    const mInst = commentText.match(/责任教员签名[：:]\s*(\S+)/);
    info.instructor_name = mInst ? mInst[1] : null;
    info.instructor_date = parseDateFromText(commentText);
    info.comment_body = commentText.replace(/责任教员签名[\s\S]*/, '').trim();
  } else {
    info.comment_full = '';
    info.comment_has_audit = false;
    info.comment_has_improvement = false;
    info.comment_has_direction = false;
    info.instructor_name = null;
    info.instructor_date = null;
    info.comment_body = '';
  }

  // 科室培训主管签名
  if (rowTrainerSig >= 0) {
    const sig1 = rows[rowTrainerSig][0] || '';
    const m1 = sig1.match(/科室培训主管签名[：:]\s*(\S+)/);
    info.trainer_sig_name = m1 ? m1[1] : null;
    info.trainer_sig_date = parseDateFromText(sig1);
  } else {
    info.trainer_sig_name = null;
    info.trainer_sig_date = null;
  }

  // 科室主任签名
  if (rowDirectorSig >= 0) {
    const sig2 = rows[rowDirectorSig][0] || '';
    const m2 = sig2.match(/科室主任签名[：:]\s*(\S+)/);
    info.director_sig_name = m2 ? m2[1] : null;
    info.director_sig_date = parseDateFromText(sig2);
  } else {
    info.director_sig_name = null;
    info.director_sig_date = null;
  }

  return info;
}

// ============================================================
// 执行所有检查
// ============================================================
function runChecks(allDocs) {
  const issues = [];

  // 按学员分组
  const byStudent = {};
  for (const doc of allDocs) {
    const name = doc.student_name;
    if (name) {
      if (!byStudent[name]) byStudent[name] = [];
      byStudent[name].push(doc);
    }
  }
  for (const name in byStudent) {
    byStudent[name].sort((a, b) => (a.file_month || 0) - (b.file_month || 0));
  }

  // 1. 纵向对比 - 同一学员跨月复制粘贴
  for (const name in byStudent) {
    const docs = byStudent[name];
    if (docs.length < 2) continue;
    for (let i = 0; i < docs.length - 1; i++) {
      const d1 = docs[i], d2 = docs[i + 1];
      const m1 = d1.file_month, m2 = d2.file_month;
      const simS = calcSimilarity(d1.summary_body, d2.summary_body);
      if (simS >= SIMILARITY_THRESHOLD) {
        const pct = Math.round(simS * 100);
        issues.push([name, m2 + '月',
          '【' + m2 + '月】' + m2 + '月学员总结与' + m1 + '月高度雷同（相似度' + pct + '%），疑似复制粘贴',
          '【' + m2 + '月】认真重新撰写，体现当月实际培训情况，严禁复制粘贴']);
      }
      const simC = calcSimilarity(d1.comment_body, d2.comment_body);
      if (simC >= SIMILARITY_THRESHOLD) {
        const pct = Math.round(simC * 100);
        issues.push([name, m2 + '月',
          '【' + m2 + '月】' + m2 + '月教员评语与' + m1 + '月高度雷同（相似度' + pct + '%），疑似复制粘贴',
          '【' + m2 + '月】认真重新撰写，体现当月实际培训情况，严禁复制粘贴']);
      }
    }
  }

  // 2. 横向对比 - 不同学员间复制粘贴
  const checkedPairs = new Set();
  for (let i = 0; i < allDocs.length; i++) {
    for (let j = i + 1; j < allDocs.length; j++) {
      const d1 = allDocs[i], d2 = allDocs[j];
      if (d1.student_name === d2.student_name) continue;
      const pair = [d1.student_name, d2.student_name].sort().join('|');
      if (checkedPairs.has(pair)) continue;
      const simS = calcSimilarity(d1.summary_body, d2.summary_body);
      if (simS >= HORIZONTAL_THRESHOLD) {
        checkedPairs.add(pair);
        const pct = Math.round(simS * 100);
        issues.push([
          d1.student_name + '与' + d2.student_name, d1.file_month + '月',
          '【' + d1.file_month + '月】' + d1.student_name + '与' + d2.student_name + '学员总结高度雷同（相似度' + pct + '%），疑似互相复制',
          '认真重新撰写，体现个人实际培训情况']);
      }
      const simC = calcSimilarity(d1.comment_body, d2.comment_body);
      if (simC >= HORIZONTAL_THRESHOLD) {
        checkedPairs.add(pair);
        const pct = Math.round(simC * 100);
        issues.push([
          d1.student_name + '与' + d2.student_name, d1.file_month + '月',
          '【' + d1.file_month + '月】' + d1.student_name + '与' + d2.student_name + '教员评语高度雷同（相似度' + pct + '%），疑似互相复制',
          '认真重新撰写，体现个人实际培训情况']);
      }
    }
  }

  // 3. 学员总结结构检查
  for (const doc of allDocs) {
    const name = doc.student_name, m = doc.file_month;
    if (!doc.summary_has_overview) issues.push([name, m + '月', '【' + m + '月】学员总结缺少"总体情况"部分', '【' + m + '月】请补齐相关内容']);
    if (!doc.summary_has_detail) issues.push([name, m + '月', '【' + m + '月】学员总结缺少"具体情况"部分', '【' + m + '月】请补齐相关内容']);
    if (!doc.summary_has_next) issues.push([name, m + '月', '【' + m + '月】学员总结缺少"下月重点"部分', '【' + m + '月】请补齐相关内容']);
  }

  // 4. 教员评语三方面检查
  for (const doc of allDocs) {
    const name = doc.student_name, m = doc.file_month;
    if (!doc.comment_has_audit) issues.push([name, m + '月', '【' + m + '月】教员评语缺少"审核总结真实性、准确性、完整性"方面', '【' + m + '月】请补齐相关内容']);
    if (!doc.comment_has_improvement) issues.push([name, m + '月', '【' + m + '月】教员评语缺少"上月纠正改进事项完成情况评估"方面', '【' + m + '月】请补齐相关内容']);
    if (!doc.comment_has_direction) issues.push([name, m + '月', '【' + m + '月】教员评语缺少"后续培训重点关注方向"方面', '【' + m + '月】请补齐相关内容']);
  }

  // 5. 入职时间和见习开始时间一致性
  for (const name in byStudent) {
    const docs = byStudent[name];
    const entryDates = new Set(), internshipDates = new Set();
    for (const d of docs) {
      if (d.entry_date) entryDates.add(d.entry_date);
      if (d.internship_start) internshipDates.add(d.internship_start);
    }
    if (entryDates.size > 1) issues.push([name, '跨月', '入职时间在不同月份报表中不一致：' + [...entryDates].join(', '), '请核实并统一入职时间']);
    if (internshipDates.size > 1) issues.push([name, '跨月', '岗位见习开始时间在不同月份报表中不一致：' + [...internshipDates].join(', '), '请核实并统一岗位见习开始时间']);
    for (const d of docs) {
      const m = d.file_month;
      if (!d.entry_date) issues.push([name, m + '月', '【' + m + '月】缺少入职时间', '【' + m + '月】请补齐相关内容']);
      if (!d.internship_start) issues.push([name, m + '月', '【' + m + '月】缺少岗位见习开始时间', '【' + m + '月】请补齐相关内容']);
    }
  }

  // 6. 培训阶段与文件名月份一致性
  for (const doc of allDocs) {
    const name = doc.student_name, fm = doc.file_month, sm = doc.stage_month;
    if (sm !== null && fm !== null && sm !== fm) {
      issues.push([name, fm + '月', '【' + fm + '月】培训阶段日期（' + sm + '月）与报表月份（' + fm + '月）不一致', '【' + fm + '月】请核实并更正培训阶段日期']);
    }
  }

  // 7. 岗位实作时长是否更新
  for (const name in byStudent) {
    const docs = byStudent[name];
    if (docs.length < 2) continue;
    for (let i = 0; i < docs.length - 1; i++) {
      const d1 = docs[i], d2 = docs[i + 1];
      const m2 = d2.file_month;
      const h1c = d1.hours_command, h2c = d2.hours_command;
      const h1a = d1.hours_assistant, h2a = d2.hours_assistant;
      if (h1c !== null && h2c !== null && h1c === h2c && h1a !== null && h2a !== null && h1a === h2a) {
        issues.push([name, m2 + '月',
          '【' + m2 + '月】' + m2 + '月岗位实作时长与' + d1.file_month + '月完全相同（管制指挥岗' + h1c + '小时，助理管制岗' + h1a + '小时），未更新',
          '【' + m2 + '月】核实并更新岗位实作时长数据']);
      }
    }
  }

  // 8. 签名日期与报表月份一致性（签名早于报表月份才算错误）
  for (const doc of allDocs) {
    const name = doc.student_name, fm = doc.file_month;
    for (const [sigName, sigDate] of [['科室培训主管', doc.trainer_sig_date], ['科室主任', doc.director_sig_date]]) {
      if (sigDate) {
        const sigMonth = extractMonthFromDate(sigDate);
        if (sigMonth !== null && fm !== null && sigMonth < fm) {
          issues.push([name, fm + '月',
            '【' + fm + '月】' + sigName + '签名日期（' + sigMonth + '月）早于报表月份（' + fm + '月），签名日期异常',
            '【' + fm + '月】请核实并更正签名日期']);
        }
      }
    }
  }

  // 9. 科室主任签名是否正确
  for (const doc of allDocs) {
    const name = doc.student_name, m = doc.file_month;
    if (doc.director_sig_name && doc.director_sig_name !== CORRECT_DIRECTOR) {
      issues.push([name, m + '月',
        '【' + m + '月】科室主任签名为「' + doc.director_sig_name + '」，应为「' + CORRECT_DIRECTOR + '」',
        '【' + m + '月】请核实并更正签名信息']);
    }
  }

  // 10. 科室培训主管签名是否正确
  for (const doc of allDocs) {
    const name = doc.student_name, m = doc.file_month;
    if (doc.trainer_sig_name && doc.trainer_sig_name !== CORRECT_TRAINER) {
      issues.push([name, m + '月',
        '【' + m + '月】科室培训主管签名为「' + doc.trainer_sig_name + '」，应为「' + CORRECT_TRAINER + '」',
        '【' + m + '月】请核实并更正签名信息']);
    }
  }

  return issues;
}

// ============================================================
// 合并问题并生成结果
// ============================================================
function mergeIssues(issues) {
  const studentIssues = {};
  for (const [name, month, problem, fix] of issues) {
    if (!studentIssues[name]) studentIssues[name] = { problems: [], fixes: [], months: new Set() };
    studentIssues[name].problems.push(problem);
    studentIssues[name].fixes.push(fix);
    studentIssues[name].months.add(month);
  }
  const results = [];
  for (const name of Object.keys(studentIssues).sort()) {
    const info = studentIssues[name];
    const monthsStr = [...info.months].sort().join('、');
    results.push({
      name: name + '（' + monthsStr + '）',
      problems: info.problems.join('\n'),
      fixes: info.fixes.join('\n'),
    });
  }
  return results;
}

// ============================================================
// 生成 Excel
// ============================================================
function generateExcel(results) {
  const header = ['被查学员', '存在问题', '整改要求'];
  const data = results.map(r => [r.name, r.problems, r.fixes]);
  const wsData = [header, ...data];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{ wch: 25 }, { wch: 70 }, { wch: 50 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '检查结果');
  return XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
}

// ============================================================
// 季度报表审核
// ============================================================
const QUARTER_END = {1:[3,31], 2:[6,30], 3:[9,30], 4:[12,31]};

function quarterEndDate(year, quarter) {
  const [m, d] = QUARTER_END[quarter];
  return year + '/' + m + '/' + d;
}

function prevQuarterEndDate(year, quarter) {
  if (quarter === 1) return (year - 1) + '/12/31';
  const [m, d] = QUARTER_END[quarter - 1];
  return year + '/' + m + '/' + d;
}

function prevQuarterStartDate(year, quarter) {
  // First day of the previous quarter
  if (quarter === 1) return (year - 1) + '/10/1';
  const qStartMonth = { 2: 1, 3: 4, 4: 7 };
  return year + '/' + qStartMonth[quarter] + '/1';
}

function qDateOffset(dateStr, days) {
  // Parse "YYYY/M/D" and offset by N days, return normalized "YYYY/M/D"
  const parts = dateStr.split('/').map(Number);
  const d = new Date(parts[0], parts[1] - 1, parts[2]);
  d.setDate(d.getDate() + days);
  return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
}

function qDateNum(dateStr) {
  // Convert "YYYY/M/D" to a comparable number YYYYMMDD
  const p = dateStr.split('/').map(Number);
  return p[0] * 10000 + p[1] * 100 + p[2];
}

function parseQuarterFromFilename(path) {
  const m = path.match(/(\d{2,4})\s*年+?\s*第?\s*([一二三四1-4])\s*季度/);
  if (!m) return { year: null, quarter: null };
  let year = parseInt(m[1]);
  if (year < 100) year += 2000;
  const qmap = {'一':1,'二':2,'三':3,'四':4,'1':1,'2':2,'3':3,'4':4};
  return { year: year, quarter: qmap[m[2]] || parseInt(m[2]) };
}

function qFindRow(rows, pattern, col, start) {
  start = start || 0;
  const re = new RegExp(pattern);
  for (let i = start; i < rows.length; i++) {
    for (let j = 0; j < rows[i].length; j++) {
      if (col !== undefined && col !== null && j !== col) continue;
      if (rows[i][j] !== null && rows[i][j] !== undefined && re.test(String(rows[i][j]))) return i;
    }
  }
  return -1;
}

function qNormalizeDate(val) {
  if (val === null || val === undefined) return null;
  // JS Date object (from cellDates:true)
  if (val instanceof Date) {
    return val.getFullYear() + '/' + (val.getMonth() + 1) + '/' + val.getDate();
  }
  if (typeof val === 'number') {
    // Excel serial date
    const d = XLSX.SSF.parse_date_code(val);
    if (d) return d.y + '/' + d.m + '/' + d.d;
    return null;
  }
  const s = String(val).trim();
  if (!s) return null;
  const m = s.match(/(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
  if (m) return m[1] + '/' + parseInt(m[2]) + '/' + parseInt(m[3]);
  // Try Excel serial from string
  const num = parseFloat(s);
  if (!isNaN(num) && num > 20000 && num < 60000) {
    const d = XLSX.SSF.parse_date_code(num);
    if (d) return d.y + '/' + d.m + '/' + d.d;
  }
  return s;
}

function qExtractTextSection(rows, headerPattern, skipPatterns) {
  const r = qFindRow(rows, headerPattern);
  if (r < 0) return '';
  const texts = [];
  for (let i = r + 2; i < Math.min(r + 12, rows.length); i++) {
    const row = rows[i];
    if (row && row[0]) {
      const cs = String(row[0]);
      let skip = false;
      if (skipPatterns) {
        for (const sp of skipPatterns) {
          if (new RegExp(sp).test(cs)) { skip = true; break; }
        }
      }
      if (skip) break;
      texts.push(cs);
    }
    if (row && row[2]) texts.push(String(row[2]));
    if (row && row.length > 6 && row[6]) texts.push(String(row[6]));
  }
  return texts.join(' ');
}

function qExtractTextAfter(rows, headerPattern, skipPatterns) {
  const r = qFindRow(rows, headerPattern);
  if (r < 0) return '';
  const texts = [];
  for (let i = r + 1; i < Math.min(r + 5, rows.length); i++) {
    const cell = rows[i] && rows[i].length > 0 ? rows[i][0] : null;
    if (cell === null || cell === undefined) continue;
    const cs = String(cell);
    let skip = false;
    if (skipPatterns) {
      for (const sp of skipPatterns) {
        if (new RegExp(sp).test(cs)) { skip = true; break; }
      }
    }
    if (skip) break;
    texts.push(cs);
  }
  return texts.join(' ');
}

function parseQuarterlyExcel(arrayBuffer, filename, fullPath) {
  const wb = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });

  const nameMatch = filename.match(/[（(]([^）)]+)[）)]/);
  const name = nameMatch ? nameMatch[1].trim() : null;
  const qInfo = parseQuarterFromFilename(fullPath || filename);

  const info = {
    filename: filename,
    student_name: name,
    year: qInfo.year,
    quarter: qInfo.quarter,
  };

  // Row 1: dates (本次评估日期 at col C, 上次评估日期 at col G)
  const r1 = rows[1] || [];
  info.this_date = qNormalizeDate(r1[2] !== undefined ? r1[2] : null);
  info.last_date = qNormalizeDate(r1[6] !== undefined ? r1[6] : null);

  // Row 3: qualification (已获得岗位资格 at col C)
  const r3 = rows[3] || [];
  info.qualification = (r3[2] !== null && r3[2] !== undefined) ? String(r3[2]).trim() : '';

  // Row 4: instructor (评估教员 at col C)
  const r4 = rows[4] || [];
  info.instructor = (r4[2] !== null && r4[2] !== undefined) ? String(r4[2]).trim() : '';

  // Positions (after 岗位名称 header)
  const rHdr = qFindRow(rows, '岗位名称', 0);
  const positions = [];
  if (rHdr >= 0) {
    for (let i = rHdr + 1; i < Math.min(rHdr + 6, rows.length); i++) {
      const cell = rows[i] && rows[i].length > 0 ? rows[i][0] : null;
      if (cell === null || cell === undefined) continue;
      const cs = String(cell).trim();
      if (!cs || /^\d+\./.test(cs)) break;
      positions.push(cs);
    }
  }
  info.positions = positions;

  // 责任教员评价 - check if scores exist
  const rEval = qFindRow(rows, '责任教员评价');
  let scoreCount = 0;
  if (rEval >= 0) {
    for (let i = rEval + 1; i < Math.min(rEval + 30, rows.length); i++) {
      const r = rows[i];
      if (!r) continue;
      for (let j = 5; j < Math.min(9, r.length); j++) {
        if (r[j] !== null && r[j] !== undefined) {
          const v = parseFloat(String(r[j]));
          if ([3, 5, 7, 9].indexOf(v) >= 0) scoreCount++;
        }
      }
    }
  }
  info.eval_filled = scoreCount > 0;

  // 4 text fields for copy-paste detection
  info.text_case = qExtractTextSection(rows, '复盘典型案例.*责任教员', ['关键事件', '工作表现', '^\\d+\\.']);
  info.text_event = qExtractTextSection(rows, '关键事件记录', ['工作表现', '^\\d+\\.']);
  info.text_perf = qExtractTextAfter(rows, '工作表现概述', ['^\\d+\\.']);
  info.text_suggest = qExtractTextAfter(rows, '下阶段培训工作改进建议', ['^\\d+\\.']);

  // 培训主管签名
  const rSig = qFindRow(rows, '部门培训主管意见');
  info.trainer_sig = null;
  if (rSig >= 0) {
    for (let i = rSig; i < Math.min(rSig + 5, rows.length); i++) {
      const r = rows[i];
      if (r && r[0] && String(r[0]).includes('签名')) {
        for (let j = r.length - 1; j > 0; j--) {
          if (r[j] && String(r[j]).trim() && !String(r[j]).includes('签名')) {
            info.trainer_sig = String(r[j]).trim();
            break;
          }
        }
        break;
      }
    }
  }

  // 序号: 总第X份 (col D=3), 本年度第X份 (col H=7)
  const rSeq = qFindRow(rows, '序号');
  info.total_seq = null;
  info.year_seq = null;
  if (rSeq >= 0) {
    const r = rows[rSeq];
    if (r && r.length > 3 && r[3] !== null && r[3] !== undefined) {
      const v = parseInt(String(r[3]).trim());
      if (!isNaN(v)) info.total_seq = v;
    }
    if (r && r.length > 7 && r[7] !== null && r[7] !== undefined) {
      const v = parseInt(String(r[7]).trim());
      if (!isNaN(v)) info.year_seq = v;
    }
  }

  // 编号
  const rId = qFindRow(rows, '编号');
  info.doc_id = null;
  if (rId >= 0) {
    const r = rows[rId];
    if (r && r.length > 2 && r[2]) info.doc_id = String(r[2]).trim();
  }

  return info;
}

function runQuarterlyChecks(allDocs) {
  const issues = [];
  const currentDocs = allDocs.filter(d => d._is_current);
  const prevDocs = allDocs.filter(d => !d._is_current);
  const prevByName = {};
  for (const d of prevDocs) {
    if (d.student_name) prevByName[d.student_name] = d;
  }

  for (const doc of currentDocs) {
    const name = doc.student_name;
    const instr = doc.instructor || '';
    const year = doc.year;
    const quarter = doc.quarter;
    if (!year || !quarter || !name) continue;

    const studentIssues = [];

    // 1. 本次评估日期 — 允许季度最后一天前后10天
    const expected = quarterEndDate(year, quarter);
    const tdNum = qDateNum(doc.this_date);
    if (doc.this_date &&
        (tdNum < qDateNum(qDateOffset(expected, -10)) || tdNum > qDateNum(qDateOffset(expected, 10)))) {
      studentIssues.push('本次评估日期错误');
    }

    // 2. 上次评估日期 — 允许上季度最后一天前后10天
    const expectedLast = prevQuarterEndDate(year, quarter);
    const ldNum = qDateNum(doc.last_date);
    if (doc.last_date &&
        (ldNum < qDateNum(qDateOffset(expectedLast, -10)) || ldNum > qDateNum(qDateOffset(expectedLast, 10)))) {
      studentIssues.push('上次评估日期错误');
    }

    // 3. 责任教员评价
    if (!doc.eval_filled) {
      studentIssues.push('责任教员评价未填');
    }

    // 4. 培训主管签名
    if (doc.trainer_sig && doc.trainer_sig !== CORRECT_TRAINER) {
      studentIssues.push('培训主管填错');
    }

    // 5. 总第X份
    const prev = prevByName[name];
    if (prev && prev.total_seq !== null && doc.total_seq !== null) {
      const expectedTotal = prev.total_seq + 1;
      if (doc.total_seq !== expectedTotal) {
        studentIssues.push('总第' + expectedTotal + '份错填成第' + doc.total_seq + '份');
      }
    }

    // 6. 本年度第X份
    if (doc.year_seq !== null && quarter) {
      if (doc.year_seq !== quarter) {
        studentIssues.push('本年度第' + doc.year_seq + '份错填成第' + quarter + '份');
      }
    }

    if (studentIssues.length > 0) {
      issues.push({ name: name, instructor: instr, issues: studentIssues, doc: doc });
    }
  }

  // 7. Cross-quarter copy-paste (same student)
  const byStudent = {};
  for (const d of allDocs) {
    if (d.student_name) {
      if (!byStudent[d.student_name]) byStudent[d.student_name] = [];
      byStudent[d.student_name].push(d);
    }
  }

  for (const name in byStudent) {
    const docsList = byStudent[name];
    const curr = docsList.filter(d => d._is_current);
    const prev = docsList.filter(d => !d._is_current);
    if (!curr.length || !prev.length) continue;
    for (const cd of curr) {
      for (const pd of prev) {
        const fields = [
          ['text_case', '复盘典型案例'],
          ['text_event', '关键事件记录'],
          ['text_perf', '工作表现概述'],
          ['text_suggest', '下阶段培训工作改进建议']
        ];
        for (const [fk, fn] of fields) {
          const sim = calcSimilarity(cd[fk] || '', pd[fk] || '');
          if (sim >= SIMILARITY_THRESHOLD && (cd[fk] || '').trim()) {
            const msg = fn + '与上季度内容高度相似（相似度' + Math.round(sim * 100) + '%），疑似复制粘贴';
            const existing = issues.find(x => x.name === name);
            if (existing) {
              if (!existing.issues.includes(msg)) existing.issues.push(msg);
            } else {
              issues.push({ name: name, instructor: cd.instructor || '', issues: [msg], doc: cd });
            }
          }
        }
      }
    }
  }

  // 8. Cross-student copy-paste (same quarter)
  for (let i = 0; i < currentDocs.length; i++) {
    for (let j = i + 1; j < currentDocs.length; j++) {
      const d1 = currentDocs[i], d2 = currentDocs[j];
      if (d1.student_name === d2.student_name) continue;
      const fields = [
        ['text_case', '复盘典型案例'],
        ['text_event', '关键事件记录'],
        ['text_perf', '工作表现概述'],
        ['text_suggest', '下阶段培训工作改进建议']
      ];
      for (const [fk, fn] of fields) {
        const sim = calcSimilarity(d1[fk] || '', d2[fk] || '');
        if (sim >= SIMILARITY_THRESHOLD && (d1[fk] || '').trim() && (d2[fk] || '').trim()) {
          const msg1 = fn + '与' + d2.student_name + '内容高度相似（相似度' + Math.round(sim * 100) + '%），疑似复制粘贴';
          const msg2 = fn + '与' + d1.student_name + '内容高度相似（相似度' + Math.round(sim * 100) + '%），疑似复制粘贴';
          for (const [d, msg] of [[d1, msg1], [d2, msg2]]) {
            const ex = issues.find(x => x.name === d.student_name);
            if (ex) {
              if (!ex.issues.includes(msg)) ex.issues.push(msg);
            } else {
              issues.push({ name: d.student_name, instructor: d.instructor || '', issues: [msg], doc: d });
            }
          }
        }
      }
    }
  }

  // Sort by name
  issues.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'zh'));
  return issues;
}

function generateQuarterlyExcel(issues) {
  const header = ['被查学员', '责任教员及见习模块', '存在问题', '整改要求'];
  const data = issues.map(item => [
    item.name,
    item.instructor,
    item.issues.map((x, i) => (i + 1) + '、' + x).join('\n'),
    '按照表格要求修改'
  ]);
  const wsData = [header, ...data];

  // Footer rows
  const sr = data.length + 2;
  wsData.push([]); // empty row
  wsData.push(['检查人', '', '', '']);
  wsData.push(['检查时间（段）', '', '', '']);

  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{ wch: 12 }, { wch: 20 }, { wch: 60 }, { wch: 18 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '审核结果');
  return XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const folderInput = document.getElementById('folderInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', e => handleFiles(e.target.files));
folderInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(fileList) {
  const files = Array.from(fileList);
  const docxFiles = files.filter(f => f.name.endsWith('.docx') && !f.name.startsWith('~$'));
  const xlsxFiles = files.filter(f => f.name.endsWith('.xlsx') && !f.name.startsWith('~$'));

  // Direct xlsx files → quarterly mode
  if (xlsxFiles.length > 0 && docxFiles.length === 0) {
    auditMode = 'quarterly';
    // Split into current and previous quarter by filename
    const parsed = xlsxFiles.map(f => ({ file: f, q: parseQuarterFromFilename(f.name) }));
    const quarters = [...new Set(parsed.filter(p => p.q.quarter).map(p => p.q.year * 10 + p.q.quarter))].sort((a, b) => b - a);
    const currentQ = quarters[0]; // undefined if no filenames contain quarter info

    uploadedFiles = [];
    prevQuarterFiles = [];
    const listEl = document.getElementById('fileList');
    listEl.style.display = 'block';
    listEl.innerHTML = '';
    let loaded = 0;
    const total = xlsxFiles.length;
    for (const p of parsed) {
      const reader = new FileReader();
      reader.onload = e => {
        const entry = { name: p.file.name, data: e.result };
        // If quarter info is in filename, use it; otherwise default to current quarter
        const isCurr = !currentQ || (p.q.year * 10 + p.q.quarter === currentQ);
        if (isCurr) uploadedFiles.push(entry);
        else prevQuarterFiles.push(entry);
        loaded++;
        const item = document.createElement('div');
        item.className = 'file-item';
        const qLabel = isCurr ? '当前季度' : '上季度';
        item.innerHTML = '<span class="file-name">' + p.file.name + '</span><span class="file-status ok">' + qLabel + '</span>';
        listEl.appendChild(item);
        if (loaded === total) {
          document.getElementById('btnStart').disabled = false;
        }
      };
      reader.readAsArrayBuffer(p.file);
    }
    return;
  }

  if (docxFiles.length === 0) {
    // Check if it's a RAR/ZIP
    const archives = files.filter(f => f.name.endsWith('.rar') || f.name.endsWith('.zip'));
    if (archives.length > 0) {
      processArchive(archives[0]);
      return;
    }
    showError('未找到docx或xlsx文件，请选择包含报表的压缩包或文件夹');
    return;
  }

  // docx files → monthly mode
  auditMode = 'monthly';
  uploadedFiles = [];
  const listEl = document.getElementById('fileList');
  listEl.style.display = 'block';
  listEl.innerHTML = '';

  let loaded = 0;
  for (const f of docxFiles) {
    const reader = new FileReader();
    reader.onload = e => {
      uploadedFiles.push({ name: f.name, data: e.result });
      loaded++;
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = '<span class="file-name">' + f.name + '</span><span class="file-status ok">就绪</span>';
      listEl.appendChild(item);
      if (loaded === docxFiles.length) {
        document.getElementById('btnStart').disabled = false;
      }
    };
    reader.readAsArrayBuffer(f);
  }
}

async function processArchive(file) {
  setStep(1, 'active');
  setProgress(10);
  try {
    // Detect file type by magic bytes
    const header = new Uint8Array(await file.slice(0, 4).arrayBuffer());
    const isRar = header[0]===0x52 && header[1]===0x61 && header[2]===0x72 && header[3]===0x21; // "Rar!"

    if (isRar) {
      await processRarArchive(file);
    } else {
      await processZipArchive(file);
    }
  } catch (err) {
    showError('解压失败：' + err.message + (err.message && err.message.includes('Corrupted') ? '（该文件可能不是有效的压缩包，请尝试转为ZIP格式后上传）' : ''));
    setStep(1, 'done');
  }
}

async function processZipArchive(file) {
  const zip = await JSZip.loadAsync(file);
  const docxFiles = [], xlsxFiles = [];
  zip.forEach((path, entry) => {
    if (entry.dir) return;
    const fname = path.split('/').pop();
    if (fname.startsWith('~$')) return;
    if (fname.endsWith('.docx')) docxFiles.push({ path, name: fname });
    else if (fname.endsWith('.xlsx')) xlsxFiles.push({ path, name: fname });
  });

  // Determine mode
  if (xlsxFiles.length > 0 && docxFiles.length === 0) {
    auditMode = 'quarterly';
  } else {
    auditMode = 'monthly';
  }

  if (auditMode === 'monthly' && docxFiles.length === 0) {
    showError('压缩包中未找到docx文件'); setStep(1, 'done'); return;
  }
  if (auditMode === 'quarterly' && xlsxFiles.length === 0) {
    showError('压缩包中未找到xlsx文件'); setStep(1, 'done'); return;
  }

  const targetFiles = auditMode === 'quarterly' ? xlsxFiles : docxFiles;

  // For quarterly: split into current and previous quarter
  let currentQ = null;
  if (auditMode === 'quarterly') {
    const quarters = [...new Set(xlsxFiles.map(f => {
      const q = parseQuarterFromFilename(f.path);
      return q.year * 10 + q.quarter;
    }).filter(v => v > 0))].sort((a, b) => b - a);
    currentQ = quarters[0] || null;
  }

  uploadedFiles = [];
  prevQuarterFiles = [];
  const listEl = document.getElementById('fileList');
  listEl.style.display = 'block'; listEl.innerHTML = '';
  for (let i = 0; i < targetFiles.length; i++) {
    const df = targetFiles[i];
    const data = await zip.file(df.path).async('arraybuffer');
    const entry = { name: df.name, data, fullPath: df.path };

    let label = '就绪';
    if (auditMode === 'quarterly') {
      const q = parseQuarterFromFilename(df.path);
      const qVal = q.year * 10 + q.quarter;
      if (qVal === currentQ) { uploadedFiles.push(entry); label = '当前季度'; }
      else { prevQuarterFiles.push(entry); label = '上季度'; }
    } else {
      uploadedFiles.push(entry);
    }

    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = '<span class="file-name">' + df.name + '</span><span class="file-status ok">' + label + '</span>';
    listEl.appendChild(item);
    setProgress(10 + (i / targetFiles.length) * 15);
  }
  setStep(1, 'done'); setProgress(25);
  document.getElementById('btnStart').disabled = false;
}

async function processRarArchive(file) {
  // Use libarchive.js hosted on same origin (no external CDN dependency)
  const { Archive } = await import('./libarchive.js');
  await Archive.init({ workerUrl: './worker-bundle.js' });

  const archiveInstance = await Archive.open(file);
  const filesObj = await archiveInstance.extractFiles();

  // Recursively collect .docx and .xlsx files from extracted tree
  // NOTE: libarchive.js creates File objects in a Web Worker, so instanceof File
  // does NOT work across worker boundaries. Use duck-typing instead.
  const docxFiles = [], xlsxFiles = [];
  function isFileLike(obj) {
    return obj && typeof obj === 'object' && typeof obj.arrayBuffer === 'function' && typeof obj.name === 'string';
  }
  function collect(obj, prefix) {
    for (const name of Object.keys(obj)) {
      if (name.startsWith('~$')) continue;
      const item = obj[name];
      const fullPath = prefix + name;
      if (isFileLike(item)) {
        if (name.endsWith('.docx')) docxFiles.push({ file: item, name: name, fullPath: fullPath });
        else if (name.endsWith('.xlsx')) xlsxFiles.push({ file: item, name: name, fullPath: fullPath });
      } else if (typeof item === 'object' && item !== null && !isFileLike(item)) {
        collect(item, fullPath + '/');
      }
    }
  }
  collect(filesObj, '');
  console.log('[RAR] Extracted tree keys:', Object.keys(filesObj));
  console.log('[RAR] Found xlsx:', xlsxFiles.length, 'docx:', docxFiles.length);
  xlsxFiles.forEach(f => console.log('[RAR] xlsx:', f.name, 'fullPath:', f.fullPath));

  // Determine mode
  if (xlsxFiles.length > 0 && docxFiles.length === 0) {
    auditMode = 'quarterly';
  } else {
    auditMode = 'monthly';
  }

  const targetFiles = auditMode === 'quarterly' ? xlsxFiles : docxFiles;
  if (targetFiles.length === 0) {
    showError('压缩包中未找到' + (auditMode === 'quarterly' ? 'xlsx' : 'docx') + '文件');
    setStep(1, 'done'); return;
  }

  // For quarterly: split into current and previous quarter
  let currentQ = null;
  if (auditMode === 'quarterly') {
    const quarters = [...new Set(xlsxFiles.map(f => {
      const q = parseQuarterFromFilename(f.fullPath);
      return q.year * 10 + q.quarter;
    }).filter(v => v > 0))].sort((a, b) => b - a);
    currentQ = quarters[0] || null;
  }

  uploadedFiles = [];
  prevQuarterFiles = [];
  const listEl = document.getElementById('fileList');
  listEl.style.display = 'block'; listEl.innerHTML = '';
  for (let i = 0; i < targetFiles.length; i++) {
    const df = targetFiles[i];
    const data = await df.file.arrayBuffer();
    const entry = { name: df.name, data, fullPath: df.fullPath };

    let label = '就绪';
    if (auditMode === 'quarterly') {
      const q = parseQuarterFromFilename(df.fullPath);
      const qVal = q.year * 10 + q.quarter;
      if (qVal === currentQ) { uploadedFiles.push(entry); label = '当前季度'; }
      else { prevQuarterFiles.push(entry); label = '上季度'; }
    } else {
      uploadedFiles.push(entry);
    }

    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = '<span class="file-name">' + df.name + '</span><span class="file-status ok">' + label + '</span>';
    listEl.appendChild(item);
    setProgress(10 + (i / targetFiles.length) * 15);
  }
  setStep(1, 'done'); setProgress(25);
  document.getElementById('btnStart').disabled = false;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.getElementById(id).classList.add('visible');
}

function setStep(n, state) {
  const el = document.getElementById('step' + n);
  el.className = 'progress-step ' + state;
  if (state === 'done') el.querySelector('.step-icon').innerHTML = '&#10003;';
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}

function resetSteps() {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('step' + i);
    el.className = 'progress-step';
    el.querySelector('.step-icon').textContent = i;
  }
  setProgress(0);
}

// ============================================================
// 审核主流程
// ============================================================
async function startAudit() {
  document.getElementById('btnStart').disabled = true;
  document.getElementById('errorMsg').style.display = 'none';
  showSection('sectionProgress');
  resetSteps();

  if (auditMode === 'quarterly') {
    await startQuarterlyAudit();
  } else {
    await startMonthlyAudit();
  }
}

async function startMonthlyAudit() {
  // Step 1: 解压 (already done if archive)
  setStep(1, 'done');
  setStep(2, 'active');
  setProgress(30);

  // Step 2: 解析文档
  const allDocs = [];
  const failed = [];
  for (let i = 0; i < uploadedFiles.length; i++) {
    const f = uploadedFiles[i];
    try {
      const rows = await parseDocx(f.data);
      const info = parseDocInfo(rows, f.name);
      allDocs.push(info);
    } catch (err) {
      failed.push({ name: f.name, error: err.message });
    }
    setProgress(30 + (i / uploadedFiles.length) * 30);
  }
  setStep(2, 'done');
  setProgress(60);

  // Step 3: 执行检查
  setStep(3, 'active');
  const issues = runChecks(allDocs);
  const results = mergeIssues(issues);
  setStep(3, 'done');
  setProgress(80);

  // Step 4: 生成报告
  setStep(4, 'active');
  const excelData = generateExcel(results);
  auditResults = {
    totalDocs: allDocs.length,
    totalStudents: new Set(allDocs.map(d => d.student_name).filter(Boolean)).size,
    totalIssues: issues.length,
    studentsWithIssues: results.length,
    results: results,
    excelData: excelData,
    failed: failed,
  };
  setStep(4, 'done');
  setProgress(100);

  // 显示结果
  setTimeout(() => showResults(), 300);
}

async function startQuarterlyAudit() {
  // Step 1: 解压 (already done)
  setStep(1, 'done');
  setStep(2, 'active');
  setProgress(30);

  // Step 2: 解析Excel
  const allDocs = [];
  const failed = [];

  // Parse previous quarter files
  for (let i = 0; i < prevQuarterFiles.length; i++) {
    const f = prevQuarterFiles[i];
    try {
      const info = parseQuarterlyExcel(f.data, f.name, f.fullPath);
      if (info) { info._is_current = false; allDocs.push(info); }
    } catch (err) {
      failed.push({ name: f.name, error: err.message });
    }
    setProgress(30 + (i / (uploadedFiles.length + prevQuarterFiles.length)) * 15);
  }

  // Parse current quarter files
  for (let i = 0; i < uploadedFiles.length; i++) {
    const f = uploadedFiles[i];
    try {
      const info = parseQuarterlyExcel(f.data, f.name, f.fullPath);
      if (info) { info._is_current = true; allDocs.push(info); }
    } catch (err) {
      failed.push({ name: f.name, error: err.message });
    }
    setProgress(45 + (i / uploadedFiles.length) * 15);
  }
  setStep(2, 'done');
  setProgress(60);

  // Fallback: infer quarter from last_date (more reliable than this_date)
  // Only when path-based quarter detection failed (e.g. direct xlsx upload)
  for (const doc of allDocs) {
    if (!doc.year || !doc.quarter) {
      const dStr = doc.last_date;
      if (dStr) {
        const dm = String(dStr).match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
        if (dm) {
          const yr = parseInt(dm[1]);
          const mo = parseInt(dm[2]);
          // last_date is end of previous quarter, so current quarter starts next month
          const currentMonth = mo + 1;
          doc.year = currentMonth > 12 ? yr + 1 : yr;
          const adjMonth = currentMonth > 12 ? 1 : currentMonth;
          doc.quarter = adjMonth <= 3 ? 1 : adjMonth <= 6 ? 2 : adjMonth <= 9 ? 3 : 4;
        }
      }
    }
  }

  // Step 3: 执行检查
  setStep(3, 'active');
  console.log('[Audit] allDocs:', allDocs.length, 'failed:', failed.length,
    'currentDocs:', allDocs.filter(d => d._is_current).length,
    'prevDocs:', allDocs.filter(d => !d._is_current).length);
  allDocs.forEach(d => console.log('[Audit] doc:', d.student_name, 'year:', d.year, 'q:', d.quarter,
    'is_current:', d._is_current, 'date:', d.this_date, 'qual:', d.qualification,
    'sig:', d.trainer_sig, 'eval:', d.eval_filled, 'total_seq:', d.total_seq, 'year_seq:', d.year_seq));
  const issues = runQuarterlyChecks(allDocs);
  console.log('[Audit] issues found:', issues.length);
  setStep(3, 'done');
  setProgress(80);

  // Step 4: 生成报告
  setStep(4, 'active');
  const excelData = generateQuarterlyExcel(issues);
  const currentDocs = allDocs.filter(d => d._is_current);
  auditResults = {
    totalDocs: currentDocs.length,
    totalStudents: new Set(currentDocs.map(d => d.student_name).filter(Boolean)).size,
    totalIssues: issues.length,
    studentsWithIssues: issues.length,
    results: issues.map(item => ({
      name: item.name,
      problems: item.issues.join('\n'),
      fixes: '按照表格要求修改',
      instructor: item.instructor,
    })),
    excelData: excelData,
    failed: failed,
    isQuarterly: true,
    _debug: {
      totalParsed: allDocs.length,
      currentCount: currentDocs.length,
      prevCount: allDocs.filter(d => !d._is_current).length,
      failedCount: failed.length,
      issuesFound: issues.length,
    },
  };
  setStep(4, 'done');
  setProgress(100);

  setTimeout(() => showResults(), 300);
}

function showResults() {
  showSection('sectionResults');
  document.getElementById('statDocs').textContent = auditResults.totalDocs;
  document.getElementById('statStudents').textContent = auditResults.totalStudents;
  document.getElementById('statIssues').textContent = auditResults.totalIssues;
  document.getElementById('statAffected').textContent = auditResults.studentsWithIssues;

  // Show debug diagnostic info
  if (auditResults._debug) {
    const dbg = auditResults._debug;
    let dbgHtml = '<div style="background:#FFF8E1;border:1px solid #FFE082;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#795548">';
    dbgHtml += '<b>诊断信息：</b> ';
    dbgHtml += '解析成功 ' + dbg.totalParsed + ' 份 | ';
    dbgHtml += '当前季度 ' + dbg.currentCount + ' 份 | ';
    dbgHtml += '上季度 ' + dbg.prevCount + ' 份 | ';
    dbgHtml += '解析失败 ' + dbg.failedCount + ' 份 | ';
    dbgHtml += '发现问题 ' + dbg.issuesFound + ' 条';
    if (auditResults.failed && auditResults.failed.length > 0) {
      dbgHtml += '<br><b>失败文件：</b>' + auditResults.failed.map(f => f.name + '(' + f.error + ')').join(', ');
    }
    dbgHtml += '</div>';
    const statsGrid = document.querySelector('.stats-grid');
    if (statsGrid) statsGrid.insertAdjacentHTML('afterend', dbgHtml);
  }

  const listEl = document.getElementById('resultsList');
  listEl.innerHTML = '';

  if (auditResults.results.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">&#127881;</div><p>未发现任何问题，所有报表审核通过</p></div>';
    return;
  }

  for (let i = 0; i < auditResults.results.length; i++) {
    const r = auditResults.results[i];
    const problemLines = r.problems.split('\n');
    const fixLines = r.fixes.split('\n');
    const item = document.createElement('div');
    item.className = 'student-item';

    let detailHtml = '';
    for (let j = 0; j < problemLines.length; j++) {
      detailHtml += '<div class="issue-item">';
      detailHtml += '<div class="issue-problem"><span class="issue-label">问题：</span>' + escapeHtml(problemLines[j]) + '</div>';
      if (j < fixLines.length) {
        detailHtml += '<div class="issue-fix"><span class="issue-label">整改：</span>' + escapeHtml(fixLines[j]) + '</div>';
      }
      detailHtml += '</div>';
    }

    const displayName = r.instructor
      ? escapeHtml(r.name) + ' <span style="color:#999;font-size:12px;font-weight:normal">| ' + escapeHtml(r.instructor) + '</span>'
      : escapeHtml(r.name);

    item.innerHTML =
      '<div class="student-header" onclick="toggleDetail(this)">' +
        '<span class="student-name">' + displayName + '</span>' +
        '<span><span class="student-count">' + problemLines.length + ' 个问题</span> <span class="toggle-arrow">&#9654;</span></span>' +
      '</div>' +
      '<div class="student-detail">' + detailHtml + '</div>';
    listEl.appendChild(item);
  }
}

function toggleDetail(header) {
  const detail = header.nextElementSibling;
  const arrow = header.querySelector('.toggle-arrow');
  detail.classList.toggle('open');
  arrow.classList.toggle('open');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function downloadExcel() {
  if (!auditResults || !auditResults.excelData) return;
  const blob = new Blob([auditResults.excelData], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '检查结果.xlsx';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function resetApp() {
  uploadedFiles = [];
  auditResults = null;
  auditMode = null;
  prevQuarterFiles = [];
  document.getElementById('fileList').style.display = 'none';
  document.getElementById('fileList').innerHTML = '';
  document.getElementById('btnStart').disabled = true;
  document.getElementById('errorMsg').style.display = 'none';
  fileInput.value = '';
  folderInput.value = '';
  showSection('sectionUpload');
}
</script>
